<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>充电模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 自定义滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(15, 52, 96, 0.3);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00d4ff 0%, #0099cc 100%);
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00e5ff 0%, #00b8e6 100%);
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
        }
        
        /* Firefox 滚动条样式 */
        * {
            scrollbar-width: thin;
            scrollbar-color: #00d4ff rgba(15, 52, 96, 0.3);
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        .simulator-container {
            display: flex;
            height: 100vh;
            gap: 16px;
            padding: 20px;
            background: #1a1a2e;
            position: relative;
        }
        
        .left-panel, .right-panel {
            flex: 1;
            background: #16213e;
            border-radius: 12px;
            padding: 24px;
            overflow-y: auto;
            position: relative;
        }
        
        /* 中间分隔线效果 */
        .simulator-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            height: 85%;
            width: 1px;
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(0, 212, 255, 0.2) 5%,
                rgba(0, 212, 255, 0.5) 50%, 
                rgba(0, 212, 255, 0.2) 95%,
                transparent 100%);
            pointer-events: none;
            z-index: 1;
        }
        
        .right-panel.grayed-out {
            opacity: 0.4;
            pointer-events: none;
        }
        
        h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
        }
        
        .gun-info {
            background: #0f3460;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .info-label {
            color: #aaa;
        }
        
        .info-value {
            color: #fff;
            font-weight: bold;
        }
        
        .control-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-insert {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-insert:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-start {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
        }
        
        .btn-stop {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }
        
        .btn-stop:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(250, 112, 154, 0.4);
        }
        
        .btn-remove {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
            color: white;
        }
        
        .btn-remove:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(48, 207, 208, 0.4);
        }
        
        .btn-reset {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }
        
        .btn-reset:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }
        
        .data-display {
            background: #0f3460;
            padding: 16px;
            border-radius: 8px;
        }
        
        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .data-item:last-child {
            border-bottom: none;
        }
        
        .data-label {
            color: #aaa;
            font-size: 13px;
        }
        
        .data-value {
            font-size: 20px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .data-unit {
            font-size: 12px;
            color: #aaa;
            margin-left: 4px;
        }
        
        .back-link {
            display: inline-block;
            color: #00d4ff;
            text-decoration: none;
            margin-bottom: 16px;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: #00a8cc;
        }
        
        .status-message {
            background: #0f3460;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
            color: #00d4ff;
        }
        
        /* BMS 数据容器 */
        .bms-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: #0f3460;
            padding: 30px 20px;
            border-radius: 12px;
            min-height: 280px;
        }
        
        .bms-left {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 180px;
        }
        
        .bms-data-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .bms-label {
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .bms-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .bms-unit {
            font-size: 14px;
            color: #aaa;
            margin-left: 4px;
        }
        
        /* 电池动画 */
        .battery-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-left: 60px;
        }
        
        .battery-pole {
            width: 40px;
            height: 15px;
            background: linear-gradient(180deg, #555 0%, #333 100%);
            border-radius: 8px 8px 0 0;
            position: relative;
        }
        
        .battery-pole::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 8px;
            background: #222;
            border-radius: 2px;
        }
        
        .battery-body {
            width: 80px;
            height: 200px;
            background: linear-gradient(135deg, #1a2332 0%, #0f1923 100%);
            border: 3px solid #00d4ff;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 20px rgba(0, 212, 255, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        .battery-level {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 0%;
            background: linear-gradient(180deg, 
                #00ff88 0%, 
                #00d4ff 50%, 
                #0099cc 100%);
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }
        
        .battery-level.low {
            background: linear-gradient(180deg, 
                #ff6b6b 0%, 
                #ee5a6f 100%);
        }
        
        .battery-level.medium {
            background: linear-gradient(180deg, 
                #ffd93d 0%, 
                #f5a623 100%);
        }
        
        .battery-liquid {
            position: absolute;
            top: -10px;
            left: -50%;
            width: 200%;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 45%;
            animation: wave 3s ease-in-out infinite;
        }
        
        .battery-liquid::before,
        .battery-liquid::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 45%;
        }
        
        .battery-liquid::before {
            animation: wave 4s ease-in-out infinite;
        }
        
        .battery-liquid::after {
            animation: wave 5s ease-in-out infinite reverse;
        }
        
        @keyframes wave {
            0%, 100% {
                transform: translateX(0) translateY(0);
            }
            25% {
                transform: translateX(-25%) translateY(-5px);
            }
            50% {
                transform: translateX(0) translateY(0);
            }
            75% {
                transform: translateX(25%) translateY(-5px);
            }
        }
        
        .battery-percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 
                0 0 10px rgba(0, 0, 0, 0.8),
                0 0 20px rgba(0, 212, 255, 0.5);
            z-index: 10;
        }
        
        /* 自定义确认对话框 */
        .custom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }
        
        .custom-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .modal-content {
            background: rgba(22, 33, 62, 0.95);
            border: 2px solid rgba(0, 212, 255, 0.6);
            border-radius: 16px;
            padding: 40px 32px 32px;
            max-width: 400px;
            width: 90%;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(0, 212, 255, 0.2);
            animation: slideIn 0.3s ease;
            position: relative;
            backdrop-filter: blur(10px);
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-title {
            color: #00d4ff;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .modal-message {
            color: rgba(170, 170, 170, 0.9);
            font-size: 15px;
            text-align: center;
            line-height: 1.8;
            margin-bottom: 32px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .modal-btn-cancel {
            background: rgba(42, 63, 95, 0.8);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-btn-cancel:hover {
            background: rgba(58, 79, 111, 0.9);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .modal-btn-confirm {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.9) 0%, rgba(0, 153, 204, 0.9) 100%);
            color: #fff;
        }
        
        .modal-btn-confirm:hover {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }
    </style>
</head>
<body>
    <!-- 自定义确认对话框 -->
    <div id="custom-modal" class="custom-modal">
        <div class="modal-content">
            <div class="modal-title">确认重置</div>
            <div class="modal-message">确定要重置充电枪状态吗？<br>这将清除所有相关数据。</div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmReset()">确定</button>
            </div>
        </div>
    </div>
    
    <div class="simulator-container">
        <!-- 左侧：充电站数据 -->
        <div class="left-panel">
            <a href="javascript:history.back()" class="back-link">← 返回</a>
            
            <h2>充电枪信息</h2>
            <div class="gun-info" id="gun-info">
                <div class="info-item">
                    <span class="info-label">充电枪编号:</span>
                    <span class="info-value" id="gun-code">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">充电枪类型:</span>
                    <span class="info-value" id="gun-type">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">充电枪状态:</span>
                    <span class="info-value" id="gun-status">--</span>
                </div>
            </div>
            
            <div id="status-message" class="status-message" style="display: none;"></div>
            
            <h2>充电控制</h2>
            <div class="control-buttons">
                <button id="btn-insert-gun" class="btn btn-insert">插枪</button>
                <button id="btn-start-charging" class="btn btn-start" disabled>启动充电</button>
                <button id="btn-stop-charging" class="btn btn-stop" disabled>结束充电</button>
                <button id="btn-remove-gun" class="btn btn-remove" disabled>拔枪</button>
            </div>
            
            <button id="btn-reset-gun" class="btn btn-reset" style="width: 100%; margin-bottom: 24px; background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);">重置</button>
            
            <h2>充电数据</h2>
            <div id="charging-data" class="data-display">
                <div class="data-item">
                    <span class="data-label">电压</span>
                    <span>
                        <span class="data-value" id="voltage">--</span>
                        <span class="data-unit">V</span>
                    </span>
                </div>
                <div class="data-item">
                    <span class="data-label">电流</span>
                    <span>
                        <span class="data-value" id="current">--</span>
                        <span class="data-unit">A</span>
                    </span>
                </div>
                <div class="data-item">
                    <span class="data-label">功率</span>
                    <span>
                        <span class="data-value" id="power">--</span>
                        <span class="data-unit">kW</span>
                    </span>
                </div>
                <div class="data-item">
                    <span class="data-label">SOC</span>
                    <span>
                        <span class="data-value" id="soc">--</span>
                        <span class="data-unit">%</span>
                    </span>
                </div>
            </div>
        </div>
        
        <!-- 右侧：车辆数据 -->
        <div class="right-panel grayed-out" id="vehicle-panel">
            <h2>车辆 BMS 数据</h2>
            <div id="bms-data" class="bms-container">
                <!-- 左侧数据 -->
                <div class="bms-left">
                    <div class="bms-data-item">
                        <span class="bms-label">电池电压</span>
                        <span class="bms-value">
                            <span id="battery-voltage">--</span>
                            <span class="bms-unit">V</span>
                        </span>
                    </div>
                    <div class="bms-data-item">
                        <span class="bms-label">电池电流</span>
                        <span class="bms-value">
                            <span id="battery-current">--</span>
                            <span class="bms-unit">A</span>
                        </span>
                    </div>
                    <div class="bms-data-item">
                        <span class="bms-label">电池温度</span>
                        <span class="bms-value">
                            <span id="battery-temp">--</span>
                            <span class="bms-unit">°C</span>
                        </span>
                    </div>
                    <div class="bms-data-item">
                        <span class="bms-label">SOC</span>
                        <span class="bms-value">
                            <span id="battery-soc">--</span>
                            <span class="bms-unit">%</span>
                        </span>
                    </div>
                </div>
                
                <!-- 右侧电池动画 -->
                <div class="battery-container">
                    <div class="battery-pole"></div>
                    <div class="battery-body">
                        <div class="battery-level" id="battery-level">
                            <div class="battery-liquid"></div>
                        </div>
                        <div class="battery-percentage" id="battery-percentage">--</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        const gunId = window.location.pathname.split('/').pop();
        let sessionId = null;
        let ws = null;
        let chargingDataTimer = null;
        let bmsDataTimer = null;
        let isCharging = false; // 充电状态标志
        const DATA_TIMEOUT = 20000; // 20秒超时
        
        // 页面加载时初始化
        window.onload = function() {
            initButtons();
            // 先检查活跃会话，如果有则恢复状态，否则加载充电枪信息
            checkAndRestoreActiveSession();
        };
        
        // 检查并恢复活跃会话
        function checkAndRestoreActiveSession() {
            fetch('/api/charging/active-session?gunId=' + gunId)
                .then(response => response.json())
                .then(result => {
                    if (result.code === 200 && result.data) {
                        const sessionData = result.data;
                        console.log('发现活跃会话:', sessionData);
                        restoreSessionState(sessionData);
                    } else {
                        console.log('没有活跃会话');
                        // 没有活跃会话时才加载充电枪信息
                        loadGunInfo();
                    }
                })
                .catch(error => {
                    console.error('查询活跃会话失败:', error);
                    // 出错时也加载充电枪信息
                    loadGunInfo();
                });
        }
        
        // 恢复会话状态
        function restoreSessionState(sessionData) {
            // 设置sessionId
            sessionId = sessionData.id;
            
            // 先加载充电枪基本信息（编号、类型）
            loadGunBasicInfo();
            
            // 根据会话状态更新UI
            const status = sessionData.status;
            const statusText = sessionData.statusText;
            
            document.getElementById('gun-status').textContent = statusText;
            
            if (status === 0) {
                // 已插枪状态
                document.getElementById('btn-insert-gun').disabled = true;
                document.getElementById('btn-start-charging').disabled = false;
                document.getElementById('btn-stop-charging').disabled = true;
                document.getElementById('btn-remove-gun').disabled = true;
                showStatus('检测到已插枪状态，会话ID: ' + sessionId);
            } else if (status === 1) {
                // 充电中状态
                isCharging = true; // 设置充电状态
                
                document.getElementById('btn-insert-gun').disabled = true;
                document.getElementById('btn-start-charging').disabled = true;
                document.getElementById('btn-stop-charging').disabled = false;
                document.getElementById('btn-remove-gun').disabled = true;
                
                // 右侧面板变为正常显示
                document.getElementById('vehicle-panel').classList.remove('grayed-out');
                
                showStatus('检测到充电中状态，正在恢复连接...');
                
                // 自动建立WebSocket连接
                connectWebSocket();
            } else if (status === 2) {
                // 已结束状态
                document.getElementById('btn-insert-gun').disabled = true;
                document.getElementById('btn-start-charging').disabled = true;
                document.getElementById('btn-stop-charging').disabled = true;
                document.getElementById('btn-remove-gun').disabled = false;
                showStatus('检测到充电已结束状态');
            }
        }
        
        // 加载充电枪基本信息（不更新按钮状态）
        function loadGunBasicInfo() {
            fetch('/api/piles/by-gun/' + gunId)
                .then(response => response.json())
                .then(result => {
                    if (result.code === 200) {
                        const pileDetail = result.data;
                        const gun = pileDetail.guns.find(g => g.id == gunId);
                        if (gun) {
                            document.getElementById('gun-code').textContent = gun.code;
                            document.getElementById('gun-type').textContent = gun.typeText;
                        }
                    }
                })
                .catch(error => {
                    console.error('加载充电枪信息失败:', error);
                    document.getElementById('gun-code').textContent = 'GUN-' + gunId;
                    document.getElementById('gun-type').textContent = '快充';
                });
        }
        
        // 加载充电枪信息
        function loadGunInfo() {
            // 从后端获取充电桩详情（通过充电枪ID）
            fetch('/api/piles/by-gun/' + gunId)
                .then(response => response.json())
                .then(result => {
                    if (result.code === 200) {
                        const pileDetail = result.data;
                        // 查找当前充电枪
                        const gun = pileDetail.guns.find(g => g.id == gunId);
                        if (gun) {
                            document.getElementById('gun-code').textContent = gun.code;
                            document.getElementById('gun-type').textContent = gun.typeText;
                            document.getElementById('gun-status').textContent = gun.statusText;
                            
                            // 根据充电枪状态更新按钮状态
                            updateButtonsByGunStatus(gun.status);
                        }
                    }
                })
                .catch(error => {
                    console.error('加载充电枪信息失败:', error);
                    // 降级处理：显示默认信息
                    document.getElementById('gun-code').textContent = 'GUN-' + gunId;
                    document.getElementById('gun-type').textContent = '快充';
                    document.getElementById('gun-status').textContent = '未知';
                });
        }
        
        // 根据充电枪状态更新按钮
        function updateButtonsByGunStatus(status) {
            // status: 0=空闲, 1=充电中, 2=故障
            const btnInsert = document.getElementById('btn-insert-gun');
            const btnStart = document.getElementById('btn-start-charging');
            const btnStop = document.getElementById('btn-stop-charging');
            const btnRemove = document.getElementById('btn-remove-gun');
            
            if (status === 0) {
                // 空闲状态：只能插枪
                btnInsert.disabled = false;
                btnStart.disabled = true;
                btnStop.disabled = true;
                btnRemove.disabled = true;
            } else if (status === 1) {
                // 充电中状态：只能结束充电
                btnInsert.disabled = true;
                btnStart.disabled = true;
                btnStop.disabled = false;
                btnRemove.disabled = true;
                showStatus('充电枪正在充电中');
            } else {
                // 故障或其他状态：禁用所有按钮
                btnInsert.disabled = true;
                btnStart.disabled = true;
                btnStop.disabled = true;
                btnRemove.disabled = true;
            }
        }
        
        // 初始化按钮事件
        function initButtons() {
            document.getElementById('btn-insert-gun').addEventListener('click', insertGun);
            document.getElementById('btn-start-charging').addEventListener('click', startCharging);
            document.getElementById('btn-stop-charging').addEventListener('click', stopCharging);
            document.getElementById('btn-remove-gun').addEventListener('click', removeGun);
            document.getElementById('btn-reset-gun').addEventListener('click', resetGun);
        }
        
        // 插枪操作
        function insertGun() {
            showStatus('正在插枪...');
            
            fetch('/api/charging/insert-gun', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    gunId: parseInt(gunId), 
                    vehicleId: 'TEST_VEHICLE_001' 
                })
            })
            .then(response => response.json())
            .then(result => {
                console.log('插枪响应:', result);
                if (result.code === 200) {
                    sessionId = result.data;
                    showStatus('插枪成功！会话ID: ' + sessionId);
                    
                    // 更新按钮状态
                    document.getElementById('btn-insert-gun').disabled = true;
                    document.getElementById('btn-start-charging').disabled = false;
                    document.getElementById('gun-status').textContent = '已插枪';
                } else {
                    showStatus('插枪失败: ' + result.message, true);
                }
            })
            .catch(error => {
                console.error('插枪失败:', error);
                showStatus('插枪失败，请稍后重试', true);
            });
        }
        
        // 启动充电
        function startCharging() {
            if (!sessionId) {
                showStatus('请先插枪', true);
                return;
            }
            
            showStatus('正在启动充电...');
            
            fetch('/api/charging/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId })
            })
            .then(response => response.json())
            .then(result => {
                console.log('启动充电响应:', result);
                if (result.code === 200) {
                    showStatus('充电已启动');
                    
                    // 设置充电状态
                    isCharging = true;
                    
                    // 更新按钮状态
                    document.getElementById('btn-start-charging').disabled = true;
                    document.getElementById('btn-stop-charging').disabled = false;
                    document.getElementById('gun-status').textContent = '充电中';
                    
                    // 右侧面板变为正常显示
                    document.getElementById('vehicle-panel').classList.remove('grayed-out');
                    
                    // 建立 WebSocket 连接
                    connectWebSocket();
                } else {
                    showStatus('启动充电失败: ' + result.message, true);
                }
            })
            .catch(error => {
                console.error('启动充电失败:', error);
                showStatus('启动充电失败，请稍后重试', true);
            });
        }
        
        // 结束充电
        function stopCharging() {
            if (!sessionId) {
                showStatus('没有活跃的充电会话', true);
                return;
            }
            
            showStatus('正在结束充电...');
            
            fetch('/api/charging/stop', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId })
            })
            .then(response => response.json())
            .then(result => {
                console.log('结束充电响应:', result);
                if (result.code === 200) {
                    const chargingResult = result.data;
                    showStatus(`充电结束！总电量: ${chargingResult.totalPower} kWh, 时长: ${chargingResult.chargingDuration} 分钟`);
                    
                    // 清除充电状态
                    isCharging = false;
                    
                    // 更新按钮状态
                    document.getElementById('btn-stop-charging').disabled = true;
                    document.getElementById('btn-remove-gun').disabled = false;
                    document.getElementById('gun-status').textContent = '已结束';
                    
                    // 断开 WebSocket
                    if (ws) {
                        ws.close();
                        ws = null;
                    }
                } else {
                    showStatus('结束充电失败: ' + result.message, true);
                }
            })
            .catch(error => {
                console.error('结束充电失败:', error);
                showStatus('结束充电失败，请稍后重试', true);
            });
        }
        
        // 拔枪操作
        function removeGun() {
            if (!sessionId) {
                showStatus('没有活跃的充电会话', true);
                return;
            }
            
            showStatus('正在拔枪...');
            
            fetch('/api/charging/remove-gun', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId })
            })
            .then(response => response.json())
            .then(result => {
                console.log('拔枪响应:', result);
                if (result.code === 200) {
                    showStatus('拔枪成功！');
                    
                    // 清除充电状态
                    isCharging = false;
                    
                    // 重置状态
                    sessionId = null;
                    document.getElementById('btn-insert-gun').disabled = false;
                    document.getElementById('btn-start-charging').disabled = true;
                    document.getElementById('btn-stop-charging').disabled = true;
                    document.getElementById('btn-remove-gun').disabled = true;
                    document.getElementById('gun-status').textContent = '空闲';
                    
                    // 右侧面板变为置灰
                    document.getElementById('vehicle-panel').classList.add('grayed-out');
                    
                    // 重置数据显示
                    resetDataDisplay();
                } else {
                    showStatus('拔枪失败: ' + result.message, true);
                }
            })
            .catch(error => {
                console.error('拔枪失败:', error);
                showStatus('拔枪失败，请稍后重试', true);
            });
        }
        
        // 重置充电枪状态
        function resetGun() {
            showModal();
        }
        
        // 显示自定义对话框
        function showModal() {
            document.getElementById('custom-modal').classList.add('show');
        }
        
        // 关闭对话框
        function closeModal() {
            document.getElementById('custom-modal').classList.remove('show');
        }
        
        // 确认重置
        function confirmReset() {
            closeModal();
            executeReset();
        }
        
        // 执行重置操作
        function executeReset() {
            showStatus('正在重置充电枪...');
            
            fetch('/api/charging/reset?gunId=' + gunId, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(result => {
                console.log('重置响应:', result);
                if (result.code === 200) {
                    showStatus('充电枪状态已重置');
                    
                    // 清除充电状态
                    isCharging = false;
                    
                    // 断开 WebSocket
                    if (ws) {
                        ws.close();
                        ws = null;
                    }
                    
                    // 重置所有状态
                    sessionId = null;
                    document.getElementById('btn-insert-gun').disabled = false;
                    document.getElementById('btn-start-charging').disabled = true;
                    document.getElementById('btn-stop-charging').disabled = true;
                    document.getElementById('btn-remove-gun').disabled = true;
                    document.getElementById('gun-status').textContent = '空闲';
                    
                    // 右侧面板变为置灰
                    document.getElementById('vehicle-panel').classList.add('grayed-out');
                    
                    // 重置数据显示
                    resetDataDisplay();
                } else {
                    showStatus('重置失败: ' + result.message, true);
                }
            })
            .catch(error => {
                console.error('重置失败:', error);
                showStatus('重置失败，请稍后重试', true);
            });
        }
        
        // 显示状态消息
        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = message;
            statusEl.style.display = 'block';
            statusEl.style.background = isError ? '#721c24' : '#0f3460';
            statusEl.style.color = isError ? '#f8d7da' : '#00d4ff';
            
            // 3秒后自动隐藏
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3000);
        }
        
        // 重置数据显示
        function resetDataDisplay() {
            // 清除所有定时器
            if (chargingDataTimer) {
                clearTimeout(chargingDataTimer);
                chargingDataTimer = null;
            }
            if (bmsDataTimer) {
                clearTimeout(bmsDataTimer);
                bmsDataTimer = null;
            }
            
            document.getElementById('voltage').textContent = '--';
            document.getElementById('current').textContent = '--';
            document.getElementById('power').textContent = '--';
            document.getElementById('soc').textContent = '--';
            document.getElementById('battery-voltage').textContent = '--';
            document.getElementById('battery-current').textContent = '--';
            document.getElementById('battery-temp').textContent = '--';
            document.getElementById('battery-soc').textContent = '--';
        }
        
        // 连接 WebSocket
        function connectWebSocket() {
            if (!sessionId) {
                console.error('没有会话ID，无法建立 WebSocket 连接');
                return;
            }
            
            const wsUrl = 'ws://' + window.location.host + '/ws/charging/' + sessionId;
            console.log('连接 WebSocket:', wsUrl);
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function() {
                console.log('WebSocket 连接已建立');
                showStatus('实时数据连接成功');
            };
            
            ws.onmessage = function(event) {
                try {
                    const message = JSON.parse(event.data);
                    console.log('收到消息:', message);
                    
                    if (message.type === 'CHARGING_DATA') {
                        updateChargingData(message.data);
                    } else if (message.type === 'BMS_DATA') {
                        updateBmsData(message.data);
                    }
                } catch (error) {
                    console.error('解析消息失败:', error);
                }
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket 错误:', error);
                showStatus('实时数据连接失败', true);
            };
            
            ws.onclose = function(event) {
                console.log('WebSocket 连接已关闭, code:', event.code, 'reason:', event.reason);
                ws = null;
                
                // 如果充电还在进行中，尝试重连
                if (isCharging && sessionId) {
                    console.log('充电进行中，3秒后尝试重新连接...');
                    showStatus('连接断开，正在重连...', false);
                    setTimeout(connectWebSocket, 3000);
                } else {
                    console.log('充电已结束或无会话，不重连');
                }
            };
        }
        
        // 更新充电数据
        function updateChargingData(data) {
            // 清除之前的定时器
            if (chargingDataTimer) {
                clearTimeout(chargingDataTimer);
            }
            
            if (data.voltage !== undefined && data.voltage !== null) {
                document.getElementById('voltage').textContent = data.voltage.toFixed(1);
            }
            if (data.current !== undefined && data.current !== null) {
                document.getElementById('current').textContent = data.current.toFixed(1);
            }
            if (data.power !== undefined && data.power !== null) {
                document.getElementById('power').textContent = data.power.toFixed(2);
            }
            if (data.soc !== undefined && data.soc !== null) {
                document.getElementById('soc').textContent = data.soc;
            }
            
            // 设置新的定时器，20秒后如果没有新数据则显示 --
            chargingDataTimer = setTimeout(() => {
                document.getElementById('voltage').textContent = '--';
                document.getElementById('current').textContent = '--';
                document.getElementById('power').textContent = '--';
                document.getElementById('soc').textContent = '--';
                console.log('充电数据超时，已重置显示');
            }, DATA_TIMEOUT);
        }
        
        // 更新 BMS 数据
        function updateBmsData(data) {
            // 清除之前的定时器
            if (bmsDataTimer) {
                clearTimeout(bmsDataTimer);
            }
            
            if (data.batteryVoltage !== undefined && data.batteryVoltage !== null) {
                document.getElementById('battery-voltage').textContent = data.batteryVoltage.toFixed(1);
            }
            if (data.batteryCurrent !== undefined && data.batteryCurrent !== null) {
                document.getElementById('battery-current').textContent = data.batteryCurrent.toFixed(1);
            }
            if (data.batteryTemp !== undefined && data.batteryTemp !== null) {
                document.getElementById('battery-temp').textContent = data.batteryTemp.toFixed(1);
            }
            if (data.soc !== undefined && data.soc !== null) {
                const soc = data.soc;
                document.getElementById('battery-soc').textContent = soc;
                
                // 更新电池动画
                updateBatteryAnimation(soc);
            }
            
            // 设置新的定时器，20秒后如果没有新数据则显示 --
            bmsDataTimer = setTimeout(() => {
                document.getElementById('battery-voltage').textContent = '--';
                document.getElementById('battery-current').textContent = '--';
                document.getElementById('battery-temp').textContent = '--';
                document.getElementById('battery-soc').textContent = '--';
                document.getElementById('battery-percentage').textContent = '--';
                document.getElementById('battery-level').style.height = '0%';
                console.log('BMS 数据超时，已重置显示');
            }, DATA_TIMEOUT);
        }
        
        // 更新电池动画
        function updateBatteryAnimation(soc) {
            const batteryLevel = document.getElementById('battery-level');
            const batteryPercentage = document.getElementById('battery-percentage');
            
            // 更新百分比显示
            batteryPercentage.textContent = soc + '%';
            
            // 先重置到0
            batteryLevel.style.transition = 'none';
            batteryLevel.style.height = '0%';
            
            // 根据电量改变颜色
            batteryLevel.classList.remove('low', 'medium');
            if (soc <= 20) {
                batteryLevel.classList.add('low');
            } else if (soc <= 50) {
                batteryLevel.classList.add('medium');
            }
            
            // 使用 requestAnimationFrame 确保重置生效后再开始动画
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    // 添加过渡效果并上升到目标高度
                    batteryLevel.style.transition = 'height 1s ease-out';
                    batteryLevel.style.height = soc + '%';
                });
            });
        }
    </script>
</body>
</html>
